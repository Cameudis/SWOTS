name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  host-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Run host unit tests
        run: make test
      - name: Test release archive layout
        run: make dist-test

  switch-build:
    runs-on: ubuntu-24.04
    container:
      image: devkitpro/devkita64:20260219@sha256:1fc388c3a0d34bd2045a6dadcb1020e069d5f876a187fd705de14b4440c00282
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Prepare pinned libtesla
        run: make setup-libtesla
      - name: Cross-build and verify
        run: make verify -j2
